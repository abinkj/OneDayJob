name: Zoopol EAS Builds

on:
  push:
    branches:
      - staging
      - main

jobs:
  # staging → preview build + OTA update
  build_preview:
    if: ${{ github.ref == 'refs/heads/staging' }}
    type: build
    params:
      platform: android
      profile: preview

  ota_staging:
    if: ${{ github.ref == 'refs/heads/staging' }}
    type: update
    params:
      branch: staging
      message: "Staging update"

  # main → production build + OTA update
  build_android:
    if: ${{ github.ref == 'refs/heads/main' }}
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    if: ${{ github.ref == 'refs/heads/main' }}
    type: build
    params:
      platform: ios
      profile: production

  ota_production:
    if: ${{ github.ref == 'refs/heads/main' }}
    type: update
    params:
      branch: production
      message: "Production update"